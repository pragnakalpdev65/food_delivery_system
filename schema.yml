    UserRegistration:
      type: object
      description: |-
        Serializer responsible for handling user registration.

        This serializer performs the following tasks:
        - Accepts user registration data
        - Ensures the email address is unique
        - Validates password strength using Django's password validators
        - Creates a new active user with a hashed password
      properties:
        email:
          type: string
          format: email
          description: Unique email address for the user.
        password:
          type: string
          writeOnly: true
          description: Password must be at least 8 characters long.
          minLength: 8
        username:
          type: string
          description: Username for login
          maxLength: 150
        first_name:
          type: string
        last_name:
          type: string
        user_type:
          $ref: '#/components/schemas/UserTypeEnum'
        phone_number:
          type: string
          nullable: true
          description: Contact number for notifications
          maxLength: 20
      required:
      - email
      - password
      - user_type
      - username
    UserRegistrationResponse:
      type: object
      description: |-
        Read-only serializer for user registration response.

        This serializer is used ONLY for responses after successful registration.
        It excludes all sensitive fields like password and internal flags.

        Exposed fields:
        - id: User's unique identifier
        - email: User's email address
        - username: User's username
        - first_name: User's first name
        - last_name: User's last name
        - user_type: Type of user (customer, restaurant_owner, delivery_driver)
        - is_verified: Email verification status
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        email:
          type: string
          format: email
          readOnly: true
          description: Email address for login and notifications
        username:
          type: string
          readOnly: true
          description: Username for login
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        user_type:
          allOf:
          - $ref: '#/components/schemas/UserTypeEnum'
          readOnly: true
          description: |-
            Type of user

            * `customer` - Customer
            * `restaurant_owner` - Restaurant Owner
            * `delivery_driver` - Delivery Driver
        is_verified:
          type: boolean
          readOnly: true
          description: Has the user verified their email?
      required:
      - email
      - first_name
      - id
      - is_verified
      - last_name
      - user_type
      - username
    UserTypeEnum:
      enum:
      - customer
      - restaurant_owner
      - delivery_driver
      type: string
      description: |-
        * `customer` - Customer
