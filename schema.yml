      - in: query
        name: ordering
        schema:
          type: string
        description: Order by rating, delivery_fee, created_at
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page (max 100)
      - in: query
