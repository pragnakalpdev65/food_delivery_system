openapi: 3.0.3
info:
  title: Food Delivery API
  version: 1.0.0
  description: API documentation for Food Delivery System
paths:
  /api/v1/order/{order_id}/cancel/:
    get:
      operationId: v1_order_cancel_retrieve
      description: Check if an order can be cancelled and preview refund details
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  can_cancel:
                    type: boolean
                  message:
                    type: string
                  refund_amount:
                    type: number
                  refund_percentage:
                    type: number
          description: ''
    post:
      operationId: v1_order_cancel_create
      description: Cancel an order and get refund details
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order to cancel
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                reason_detail:
                  type: string
              required:
              - reason
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  refund_amount:
                    type: number
                  refund_percentage:
                    type: number
                  refund_method:
                    type: string
          description: ''
  /api/v1/order/{order_id}/cancel/info/:
    get:
      operationId: v1_order_cancel_info_retrieve
      description: Check if an order can be cancelled and preview refund details
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  can_cancel:
                    type: boolean
                  message:
                    type: string
                  refund_amount:
                    type: number
                  refund_percentage:
                    type: number
          description: ''
    post:
      operationId: v1_order_cancel_info_create
      description: Cancel an order and get refund details
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order to cancel
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                reason_detail:
                  type: string
              required:
              - reason
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  refund_amount:
                    type: number
                  refund_percentage:
                    type: number
                  refund_method:
                    type: string
          description: ''
  /api/v1/order/{order_id}/rate/:
    post:
      operationId: v1_order_rate_create
      description: Create a rating for a specific order
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order to rate
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRating'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderRating'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderRating'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRating'
          description: ''
  /api/v1/order/{order_id}/rating/:
    get:
      operationId: v1_order_rating_retrieve
      description: Retrieve or update your rating for a specific order
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRating'
          description: ''
    put:
      operationId: v1_order_rating_update
      description: Retrieve or update your rating for a specific order
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRating'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderRating'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderRating'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRating'
          description: ''
    patch:
      operationId: v1_order_rating_partial_update
      description: Retrieve or update your rating for a specific order
      parameters:
      - in: path
        name: order_id
        schema:
          type: string
        description: ID of the order
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrderRating'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrderRating'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrderRating'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRating'
          description: ''
  /api/v1/order/{restaurant_id}/cancellation-policy/:
    get:
      operationId: v1_order_cancellation_policy_retrieve
      description: Retrieve or update cancellation policy for a restaurant
      parameters:
