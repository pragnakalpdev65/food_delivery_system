openapi: 3.0.3
info:
  title: Food Delivery API
  version: 1.0.0
  description: |-
    REST API documentation for the Food Delivery System.

    ## Authentication
    Most endpoints require a JWT access token:
    `Authorization: Bearer <access_token>`

    Obtain tokens via **Auth → Login**. Use **Auth → Refresh** to renew access tokens.

    ## Roles
    - **customer** – place orders, favorites, ratings
    - **restaurant_owner** – manage restaurants, menus, orders, dashboard
    - **delivery_driver** – delivery updates

    ## WebSockets
    Restaurant order section: `ws/orders/management/{restaurant_id}/?token=<access_token>`
    See Orders → Restaurant Order Section WebSocket info for details.
paths:
  /api/v1/users/auth/register/:
    post:
      operationId: users_auth_register_create
      description: Register a new user
      summary: Register
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
            examples:
              Register:
                value:
                  email: user@test.com
                  username: user
                  password: StrongPass123!
                  user_type: customer
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistrationResponse'
              examples:
                Register:
                  value:
