            application/json:
              schema:
                $ref: '#/components/schemas/CancellationPolicy'
          description: ''
    put:
      operationId: v1_order_cancellation_policy_update
      description: Retrieve or update cancellation policy for a restaurant
      parameters:
      - in: path
        name: restaurant_id
        schema:
          type: string
        description: ID of the restaurant
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancellationPolicy'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CancellationPolicy'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CancellationPolicy'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationPolicy'
          description: ''
    patch:
      operationId: v1_order_cancellation_policy_partial_update
      description: Retrieve or update cancellation policy for a restaurant
      parameters:
      - in: path
        name: restaurant_id
        schema:
          type: string
        description: ID of the restaurant
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCancellationPolicy'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCancellationPolicy'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCancellationPolicy'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationPolicy'
          description: ''
  /api/v1/order/instruction-templates/:
    get:
      operationId: v1_order_instruction_templates_list
      description: List active instruction templates, optionally filtered by category
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstructionTemplate'
          description: ''
  /api/v1/order/orders:
    get:
      operationId: v1_order_orders_list
      description: List orders visible to the authenticated user
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
    post:
      operationId: v1_order_orders_create
      description: Create a new order (Customer only)
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
            examples:
              CreateOrderExample:
                value:
                  restaurant: uuid
                  delivery_address: 123 Main Street
                  items:
                  - menu_item: uuid
                    quantity: 2
                summary: Create Order Example
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Order'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Order'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                CreateOrderExample:
                  value:
                    restaurant: uuid
                    delivery_address: 123 Main Street
                    items:
                    - menu_item: uuid
                      quantity: 2
                  summary: Create Order Example
          description: ''
  /api/v1/order/orders/{id}:
    get:
      operationId: v1_order_orders_retrieve
      description: Retrieve a specific order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
    put:
      operationId: v1_order_orders_update
      description: Update an order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Order'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Order'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
    patch:
      operationId: v1_order_orders_partial_update
      description: Partially update an order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrder'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrder'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrder'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
    delete:
      operationId: v1_order_orders_destroy
      description: Delete an order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/order/orders/{id}/assign_driver:
    post:
      operationId: v1_order_orders_assign_driver_create
      description: Assign a driver to the order (Restaurant owner only)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                driver_id:
                  type: string
              required:
              - driver_id
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        type:
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        properties:
          content:
            application/json:
              schema:
                message:
                  type: string
          description: ''
  /api/v1/order/orders/{id}/eta:
    get:
      operationId: v1_order_orders_eta_retrieve
      description: Get estimated delivery time for the order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        type:
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        properties:
          content:
            application/json:
              schema:
                estimated_delivery_time:
                  type: string
                  format: date-time
          description: ''
  /api/v1/order/orders/{id}/reorder:
    post:
      operationId: v1_order_orders_reorder_create
      description: Reorder from a previous order
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Order'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Order'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/order/orders/{id}/update_status:
    post:
      operationId: v1_order_orders_update_status_create
      description: Update order status based on allowed transitions
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
              required:
              - status
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        type:
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        properties:
          content:
            application/json:
              schema:
                message:
                  type: string
                status:
                  type: string
          description: ''
  /api/v1/order/review:
    get:
      operationId: v1_order_review_list
      description: Create review for delivered order (Customer only)
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: menu_item
        schema:
          type: string
          format: uuid
        description: Unique identifier (UUID)
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: rating
        schema:
          type: integer
      - in: query
        name: restaurant
        schema:
          type: string
          format: uuid
        description: Unique identifier (UUID)
      tags:
      - Orders
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
              examples:
                ReviewExample:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?offset=400&limit=100
                    previous: http://api.example.org/accounts/?offset=200&limit=100
                    results:
                    - order: uuid
                      restaurant: uuid
                      menu_item: uuid
                      rating: 5
                      comment: Great food!
                  summary: Review Example
          description: ''
    post:
      operationId: v1_order_review_create
      description: Create review for delivered order (Customer only)
      tags:
      - Orders
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
            examples:
              ReviewExample:
                value:
                  order: uuid
                  restaurant: uuid
                  menu_item: uuid
                  rating: 5
                  comment: Great food!
                summary: Review Example
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Review'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Review'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
              examples:
                ReviewExample:
                  value:
                    order: uuid
                    restaurant: uuid
                    menu_item: uuid
                    rating: 5
                    comment: Great food!
                  summary: Review Example
          description: ''
