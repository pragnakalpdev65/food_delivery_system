      properties:
        username:
          type: string
        password:
          type: string
          minLength: 8
      required:
      - password
      - username
    LoginResponse:
      type: object
      description: Serializer for login response.
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
        user:
          type: object
          additionalProperties: {}
          readOnly: true
      required:
      - access
      - refresh
      - user
    Logout:
      type: object
      description: |-
        Serializer responsible for handling user logout.

        This serializer:
        - Validates refresh token presence
        - Converts raw token string to RefreshToken object
        - Blacklists the token to invalidate future use
        - Handles invalid/expired tokens safely
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    MenuItem:
