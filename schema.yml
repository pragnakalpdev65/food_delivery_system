      - restaurant
    InstructionTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        category:
          $ref: '#/components/schemas/InstructionTemplateCategoryEnum'
        text:
          type: string
          maxLength: 200
      required:
      - category
      - id
      - text
    InstructionTemplateCategoryEnum:
      enum:
      - delivery
      - food
      - packaging
      type: string
      description: |-
        * `delivery` - Delivery
        * `food` - Food
        * `packaging` - Packaging
    ItemPopularity:
