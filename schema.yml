components:
  schemas:
    Address:
      type: object
      description: |-
        Serializer for Address model.

        Handles representation of user addresses including:
        - pin code
        - label (e.g., Home, Work)
        - full address
        - default flag
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        pin_code:
          type: string
          maxLength: 10
        label:
          type: string
          maxLength: 50
        address:
          type: string
        is_default:
          type: boolean
      required:
      - address
      - id
      - label
      - pin_code
    AddressRequest:
      type: object
      description: |-
        Serializer for Address model.

        Handles representation of user addresses including:
        - pin code
        - label (e.g., Home, Work)
        - full address
        - default flag
      properties:
        pin_code:
          type: string
          minLength: 1
          maxLength: 10
        label:
          type: string
          minLength: 1
          maxLength: 50
        address:
          type: string
          minLength: 1
        is_default:
          type: boolean
      required:
      - address
      - label
      - pin_code
    AnalyticsPack:
      type: object
      properties:
        revenue_trends:
          type: array
          items:
            $ref: '#/components/schemas/DashboardRevenueTrend'
        sales_by_category:
          type: array
          items:
            $ref: '#/components/schemas/DashboardCategorySales'
        popular_times:
          type: array
          items:
            $ref: '#/components/schemas/DashboardPopularTime'
      required:
      - popular_times
      - revenue_trends
      - sales_by_category
    AssignDriverRequestRequest:
      type: object
      properties:
        driver_id:
          type: string
          format: uuid
      required:
      - driver_id
    AssignDriverResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    CancellationPolicy:
      type: object
      properties:
        full_refund_window:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        partial_refund_window:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        partial_refund_percentage:
          type: integer
          maximum: 100
          minimum: 0
        allow_customer_cancellation:
          type: boolean
    CancellationPolicyRequest:
      type: object
      properties:
        full_refund_window:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        partial_refund_window:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        partial_refund_percentage:
          type: integer
          maximum: 100
          minimum: 0
        allow_customer_cancellation:
          type: boolean
    CategorySales:
      type: object
      properties:
        category:
          type: string
        total_orders:
          type: integer
        percentage:
          type: number
          format: double
      required:
      - category
      - percentage
      - total_orders
    ChangePasswordRequest:
      type: object
      description: |-
        Serializer for handling password change requests.

        Fields:
        - current_password: User's existing password (for verification)
        - new_password: New password to be set (validated against Django password rules)
      properties:
        current_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - confirm_password
      - current_password
      - new_password
    ConfirmEmailChangeRequest:
      type: object
      description: Finalizes email change after both confirmations.
      properties:
        new_token:
          type: string
          minLength: 1
      required:
      - new_token
    ContactPreferenceEnum:
      enum:
      - call
      - text
      - do_not_disturb
      type: string
      description: |-
        * `call` - Call
        * `text` - Text
        * `do_not_disturb` - Do Not Disturb
    CuisineTypeEnum:
      enum:
      - italian
      - chinese
      - indian
      - mexican
      - american
      - japanese
      - thai
      - mediterranean
      type: string
      description: |-
        * `italian` - Italian
        * `chinese` - Chinese
        * `indian` - Indian
        * `mexican` - Mexican
        * `american` - American
        * `japanese` - Japanese
        * `thai` - Thai
        * `mediterranean` - Mediterranean
    CustomerProfile:
      type: object
      description: |-
        Serializer for CustomerProfile model.

        Includes nested read-only addresses.
        Used for retrieving customer profile details.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        user:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          readOnly: true
        avatar:
          type: string
          format: uri
          nullable: true
        default_address:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          nullable: true
        total_orders:
          type: integer
          readOnly: true
        loyalty_points:
          type: integer
          readOnly: true
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
          readOnly: true
      required:
      - addresses
      - id
      - loyalty_points
      - total_orders
      - user
    CustomerProfileUpdateRequest:
      type: object
      description: |-
        Serializer for updating CustomerProfile.

        Supports:
        - Updating avatar and default address
        - Replacing all addresses (if provided)

        Note:
        Existing addresses are deleted and replaced with new ones.
      properties:
        avatar:
          type: string
          format: binary
          nullable: true
        default_address:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          nullable: true
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressRequest'
    DashboardCategorySales:
      type: object
      properties:
        category:
          type: string
        total_orders:
          type: integer
        percentage:
          type: number
          format: double
      required:
      - category
      - percentage
      - total_orders
    DashboardPopularTime:
      type: object
      properties:
        hour:
          type: integer
        order_count:
          type: integer
      required:
      - hour
      - order_count
    DashboardRevenueTrend:
      type: object
      properties:
        date:
          type: string
          format: date
        revenue:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - date
      - revenue
    DietaryInfoEnum:
      enum:
      - vegetarian
      - vegan
      - gluten_free
      - dairy_free
      - none
      type: string
      description: |-
        * `vegetarian` - Vegetarian
        * `vegan` - Vegan
        * `gluten_free` - Gluten Free
        * `dairy_free` - Dairy Free
        * `none` - None
    DriverList:
      type: object
      description: |-
        Serializer for listing drivers available for order assignment.

        `driver_id` is the CustomUser id expected by assign_driver.
      properties:
        driver_id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        vehicle_type:
          allOf:
          - $ref: '#/components/schemas/VehicleTypeEnum'
          description: |-
            Type of Vehicle

