components:
  schemas:
    Address:
      type: object
      description: |-
        Serializer for Address model.

        Handles representation of user addresses including:
        - pin code
        - label (e.g., Home, Work)
        - full address
        - default flag
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        pin_code:
          type: string
          maxLength: 10
        label:
          type: string
          maxLength: 50
        address:
          type: string
        is_default:
          type: boolean
      required:
      - address
      - id
      - label
      - pin_code
    CancellationPolicy:
      type: object
      properties:
        full_refund_window:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        partial_refund_window:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        partial_refund_percentage:
          type: integer
          maximum: 100
          minimum: 0
        allow_customer_cancellation:
          type: boolean
    Category4edEnum:
      enum:
      - appetizer
      - main_course
      - dessert
      - Beverage
      - side_dish
      type: string
      description: |-
        * `appetizer` - Appetizer
        * `main_course` - Main Course
        * `dessert` - Dessert
        * `Beverage` - beverage
        * `side_dish` - Side Dish
    ChangePassword:
      type: object
      description: |-
        Serializer for handling password change requests.

        Fields:
        - current_password: User's existing password (for verification)
        - new_password: New password to be set (validated against Django password rules)
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - confirm_password
      - current_password
      - new_password
    ConfirmEmailChange:
      type: object
      description: Finalizes email change after both confirmations.
      properties:
        new_token:
          type: string
      required:
      - new_token
    ContactPreferenceEnum:
      enum:
      - call
      - text
      - do_not_disturb
      type: string
      description: |-
        * `call` - Call
        * `text` - Text
        * `do_not_disturb` - Do Not Disturb
    CuisineTypeEnum:
      enum:
      - italian
      - chinese
      - indian
      - mexican
      - american
      - japanese
      - thai
      - mediterranean
      type: string
      description: |-
        * `italian` - Italian
        * `chinese` - Chinese
        * `indian` - Indian
        * `mexican` - Mexican
        * `american` - American
        * `japanese` - Japanese
        * `thai` - Thai
        * `mediterranean` - Mediterranean
    CustomerProfile:
      type: object
      description: |-
        Serializer for CustomerProfile model.

        Includes nested read-only addresses.
        Used for retrieving customer profile details.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        user:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          readOnly: true
        avatar:
          type: string
          format: uri
          nullable: true
        default_address:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          nullable: true
        total_orders:
          type: integer
          readOnly: true
        loyalty_points:
          type: integer
          readOnly: true
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
          readOnly: true
      required:
      - addresses
      - id
      - loyalty_points
      - total_orders
      - user
    CustomerProfileUpdate:
      type: object
      description: |-
        Serializer for updating CustomerProfile.

        Supports:
        - Updating avatar and default address
        - Replacing all addresses (if provided)

        Note:
        Existing addresses are deleted and replaced with new ones.
      properties:
        avatar:
          type: string
          format: uri
          nullable: true
        default_address:
          type: string
          format: uuid
          description: Unique identifier (UUID)
          nullable: true
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
    DietaryInfoEnum:
      enum:
      - vegetarian
      - vegan
      - gluten_free
      - dairy_free
      - none
      type: string
      description: |-
        * `vegetarian` - Vegetarian
        * `vegan` - Vegan
        * `gluten_free` - Gluten Free
        * `dairy_free` - Dairy Free
        * `none` - None
    DriverProfile:
      type: object
      description: |-
        Serializer for DriverProfile model.

        Used for retrieving driver profile details including:
        vehicle info, availability, and performance metrics.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier (UUID)
        avatar:
          type: string
          format: uri
          nullable: true
        vehicle_type:
          allOf:
          - $ref: '#/components/schemas/VehicleTypeEnum'
          description: |-
            Type of Vehicle

            * `bike` - Bike
            * `scooter` - Scooter
            * `car` - Car
        vehicle_number:
          type: string
          maxLength: 20
        license_number:
          type: string
          maxLength: 20
        is_available:
          type: boolean
        total_deliveries:
          type: integer
          maximum: 2147483647
          minimum: 0
        average_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
      required:
      - id
      - license_number
      - vehicle_number
    FavoriteMenuItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        menu_item:
          allOf:
          - $ref: '#/components/schemas/MenuItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - menu_item
    FavoriteRestaurant:
